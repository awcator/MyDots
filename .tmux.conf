setw -g mode-keys vi
set -g mouse on
setw -g aggressive-resize on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB,xterm-kitty:Tc"
set-option -g set-titles off
set-window-option -g window-status-current-format '#[bg=blue,fg=cyan,bold]#I#[bg=blue,fg=cyan]:#[fg=white]#W#[fg=dim]#F'
set -g status-right '#[fg=green][#[fg=white]#(echo $USER) @ #H#[fg=green]][#[fg=black,bold]%h %d %Y #[bg=green,fg=white,bold]%l:%M %p#[default]#[fg=green]]'

# ┌──────────────────────────────────────────────────┐
# │         Prefix: Alt+a (like i3 $mod)             │
# └──────────────────────────────────────────────────┘
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 900000
setw -g monitor-activity on
set -g visual-activity on

# ┌──────────────────────────────────────────────────┐
# │       i3-like: Switch windows (prefix + 1-9)     │
# │       Like i3  $mod+1-9 = switch workspace       │
# │       Auto-creates the window if it doesn't exist │
# └──────────────────────────────────────────────────┘
bind-key 1 run-shell "tmux select-window -t :1 2>/dev/null || tmux new-window -t :1"
bind-key 2 run-shell "tmux select-window -t :2 2>/dev/null || tmux new-window -t :2"
bind-key 3 run-shell "tmux select-window -t :3 2>/dev/null || tmux new-window -t :3"
bind-key 4 run-shell "tmux select-window -t :4 2>/dev/null || tmux new-window -t :4"
bind-key 5 run-shell "tmux select-window -t :5 2>/dev/null || tmux new-window -t :5"
bind-key 6 run-shell "tmux select-window -t :6 2>/dev/null || tmux new-window -t :6"
bind-key 7 run-shell "tmux select-window -t :7 2>/dev/null || tmux new-window -t :7"
bind-key 8 run-shell "tmux select-window -t :8 2>/dev/null || tmux new-window -t :8"
bind-key 9 run-shell "tmux select-window -t :9 2>/dev/null || tmux new-window -t :9"
bind-key 0 run-shell "tmux select-window -t :10 2>/dev/null || tmux new-window -t :10"

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Move pane to window (prefix + Shift+N) │
# │  Like i3  $mod+Shift+1-9 = move to workspace     │
# │  Auto-creates the window if it doesn't exist      │
# └──────────────────────────────────────────────────┘
bind-key ! run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :1 2>/dev/null || tmux new-window -t :1; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key @ run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :2 2>/dev/null || tmux new-window -t :2; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key '#' run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :3 2>/dev/null || tmux new-window -t :3; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key '$' run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :4 2>/dev/null || tmux new-window -t :4; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key % run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :5 2>/dev/null || tmux new-window -t :5; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key ^ run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :6 2>/dev/null || tmux new-window -t :6; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key & run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :7 2>/dev/null || tmux new-window -t :7; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key * run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :8 2>/dev/null || tmux new-window -t :8; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key ( run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :9 2>/dev/null || tmux new-window -t :9; tmux move-pane -s "$src" 2>/dev/null || true'
bind-key ) run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :10 2>/dev/null || tmux new-window -t :10; tmux move-pane -s "$src" 2>/dev/null || true'

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Switch windows (Alt+1-9, no prefix)    │
# │  Like i3  $mod+1-9 = switch workspace            │
# │  Auto-creates the window if it doesn't exist      │
# └──────────────────────────────────────────────────┘
bind -n M-1 run-shell "tmux select-window -t :1 2>/dev/null || tmux new-window -t :1"
bind -n M-2 run-shell "tmux select-window -t :2 2>/dev/null || tmux new-window -t :2"
bind -n M-3 run-shell "tmux select-window -t :3 2>/dev/null || tmux new-window -t :3"
bind -n M-4 run-shell "tmux select-window -t :4 2>/dev/null || tmux new-window -t :4"
bind -n M-5 run-shell "tmux select-window -t :5 2>/dev/null || tmux new-window -t :5"
bind -n M-6 run-shell "tmux select-window -t :6 2>/dev/null || tmux new-window -t :6"
bind -n M-7 run-shell "tmux select-window -t :7 2>/dev/null || tmux new-window -t :7"
bind -n M-8 run-shell "tmux select-window -t :8 2>/dev/null || tmux new-window -t :8"
bind -n M-9 run-shell "tmux select-window -t :9 2>/dev/null || tmux new-window -t :9"
bind -n M-0 run-shell "tmux select-window -t :10 2>/dev/null || tmux new-window -t :10"

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Move pane to window (Alt+Shift+1-9)    │
# │  Like i3  $mod+Shift+1-9 = move to workspace     │
# │  Auto-creates the window if it doesn't exist      │
# └──────────────────────────────────────────────────┘
bind -n M-! run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :1 2>/dev/null || tmux new-window -t :1; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n M-@ run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :2 2>/dev/null || tmux new-window -t :2; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n 'M-#' run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :3 2>/dev/null || tmux new-window -t :3; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n 'M-$' run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :4 2>/dev/null || tmux new-window -t :4; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n M-% run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :5 2>/dev/null || tmux new-window -t :5; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n M-^ run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :6 2>/dev/null || tmux new-window -t :6; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n M-& run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :7 2>/dev/null || tmux new-window -t :7; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n M-* run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :8 2>/dev/null || tmux new-window -t :8; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n M-( run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :9 2>/dev/null || tmux new-window -t :9; tmux move-pane -s "$src" 2>/dev/null || true'
bind -n M-) run-shell 'src=$(tmux display-message -p "#{session_name}:#{window_index}.#{pane_index}"); tmux select-window -t :10 2>/dev/null || tmux new-window -t :10; tmux move-pane -s "$src" 2>/dev/null || true'

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Focus pane (prefix+arrows)             │
# │  Like i3  $mod+Arrow = focus                     │
# └──────────────────────────────────────────────────┘
bind-key Left  select-pane -L
bind-key Down  select-pane -D
bind-key Up    select-pane -U
bind-key Right select-pane -R

# No-prefix: Alt+arrows to focus pane (instant like i3)
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Move pane with Shift+arrows            │
# │  prefix + Shift+Arrow  OR  Alt+Shift+Arrow        │
# │  urxvt cannot distinguish Shift+Up from Up in    │
# │  prefix mode, so we use Ctrl+Up/Down for swap    │
# │  (same physical gesture: prefix then Up/Down)    │
# └──────────────────────────────────────────────────┘
unbind -n S-Left
unbind -n S-Right
unbind -n S-Up
unbind -n S-Down
unbind -n M-S-Left
unbind -n M-S-Right
unbind -n M-S-Up
unbind -n M-S-Down

bind-key S-Left  swap-pane -s '{left-of}'  \; select-pane -l
bind-key S-Right swap-pane -s '{right-of}' \; select-pane -l
# urxvt sends Ctrl+Up/Down distinctly — map both S- and C- so either works
bind-key S-Up    swap-pane -s '{up-of}'    \; select-pane -l
bind-key S-Down  swap-pane -s '{down-of}'  \; select-pane -l
bind-key C-Up    swap-pane -s '{up-of}'    \; select-pane -l
bind-key C-Down  swap-pane -s '{down-of}'  \; select-pane -l

bind -n M-S-Left  swap-pane -s '{left-of}'  \; select-pane -l
bind -n M-S-Right swap-pane -s '{right-of}' \; select-pane -l
bind -n M-S-Up    swap-pane -s '{up-of}'    \; select-pane -l
bind -n M-S-Down  swap-pane -s '{down-of}'  \; select-pane -l

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Splits                                  │
# │  Like i3  $mod+h / $mod+v                        │
# │  h is reserved for status bar toggle (original)  │
# └──────────────────────────────────────────────────┘
bind-key h set -g status
bind-key v split-window -v -c '#{pane_current_path}'
# Also keep pipe/dash shortcuts
bind-key | split-window -h -c '#{pane_current_path}'
bind-key \\ split-window -h -c '#{pane_current_path}'
bind-key _ split-window -v -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'
bind-key '"' split-window -v -c '#{pane_current_path}'

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Fullscreen toggle (f)                   │
# │  Like i3  $mod+f = fullscreen toggle              │
# └──────────────────────────────────────────────────┘
bind-key f resize-pane -Z

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Kill pane (Shift+q / x)                 │
# │  Like i3  Alt+F4 = kill window                    │
# └──────────────────────────────────────────────────┘
bind-key x kill-pane
bind-key Q kill-pane
bind-key X kill-window

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Layout modes                            │
# │  w = tabbed (window chooser overview, like i3)    │
# │  e = toggle split even-h / even-v (like i3)       │
# └──────────────────────────────────────────────────┘
# i3 $mod+w = tabbed layout → show interactive window list
bind-key w choose-window
# i3 $mod+e = toggle split direction horizontal / vertical
bind-key e run-shell 'layout=$(tmux display-message -p "#{window_layout}"); \
  if echo "$layout" | grep -q "^[0-9a-f]*,.*{"; then \
    tmux select-layout even-vertical && tmux display-message "Layout: vertical"; \
  else \
    tmux select-layout even-horizontal && tmux display-message "Layout: horizontal"; \
  fi'

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Floating (toggle popup)                 │
# │  Like i3  $mod+Shift+Space = floating toggle      │
# └──────────────────────────────────────────────────┘
bind-key Space display-popup -E -w 80% -h 80% -d '#{pane_current_path}'

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Reload config (Shift+c)                 │
# │  Like i3  $mod+Shift+c = reload                   │
# └──────────────────────────────────────────────────┘
bind-key C source-file ~/.tmux.conf \; display-message "Config reloaded!"
unbind-key r
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Resize mode (prefix+r then arrows)     │
# │  Like i3  $mod+r = resize mode                    │
# └──────────────────────────────────────────────────┘
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5
bind-key -r M-Left  resize-pane -L 2
bind-key -r M-Down  resize-pane -D 2
bind-key -r M-Up    resize-pane -U 2
bind-key -r M-Right resize-pane -R 2

# ┌──────────────────────────────────────────────────┐
# │  i3-like: New window (Return) = new terminal      │
# │  Like i3  $mod+Return = exec terminal             │
# └──────────────────────────────────────────────────┘
bind-key Enter new-window -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Tab/back_and_forth                      │
# │  Like i3  $mod+Tab = workspace back_and_forth     │
# └──────────────────────────────────────────────────┘
bind-key Tab last-window
bind -n M-Tab last-window

# ┌──────────────────────────────────────────────────┐
# │  i3-like: Scratchpad-ish (mark/jump)              │
# │  Like i3  $mod+minus = scratchpad                 │
# └──────────────────────────────────────────────────┘
# Mark a pane and jump to it later
bind-key m command-prompt -p "Mark pane:" "select-pane -m"
bind-key '`' select-pane -M

# ┌──────────────────────────────────────────────────┐
# │          Status bar (toggle with prefix+h)        │
# │  Minimal, like i3bar — shows windows as          │
# │  workspace numbers, active highlighted            │
# └──────────────────────────────────────────────────┘
bind-key b set -g status
set-option -g status-position bottom
set -g status off

# Style
set -g status-style                 "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length           20
set -g status-right-length          60

# Left: session name (like i3 workspace group)
set -g status-left                  "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] "

# Windows: inactive = dim, active = highlighted like i3 focused workspace
set -g window-status-format         "#[bg=#313244,fg=#cdd6f4] #I #[fg=#a6adc8]#W #[default]"
set -g window-status-current-format "#[bg=#cba6f7,fg=#1e1e2e,bold] #I #[fg=#1e1e2e]#W #[default]"
set -g window-status-separator      ""

# Right: date + time
set -g status-right                 "#[bg=#313244,fg=#cdd6f4] %a %d %b #[bg=#89b4fa,fg=#1e1e2e,bold] %H:%M "

# ┌──────────────────────────────────────────────────┐
# │               Synchronize panes                   │
# └──────────────────────────────────────────────────┘
bind-key s set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# ┌──────────────────────────────────────────────────┐
# │                Join/send panes                    │
# └──────────────────────────────────────────────────┘
bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key J command-prompt -p "send pane to:"  "join-pane -t '%%'"

# ┌──────────────────────────────────────────────────┐
# │                  Mouse & Scroll                   │
# └──────────────────────────────────────────────────┘
set -g  terminal-overrides "rxvt-unicode:sitm@"
set -gq mouse on
# before v2.1
set -gq mode-mouse on
set -gq mouse-resize-pane on
set -gq mouse-select-pane on
set -gq mouse-select-window on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# ┌──────────────────────────────────────────────────┐
# │              Copy mode (vi-style)                 │
# └──────────────────────────────────────────────────┘
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi C send-keys -X copy-pipe-and-cancel "xclip -selection c"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key / copy-mode \; send-key ?

# ┌──────────────────────────────────────────────────┐
# │                    Plugins                        │
# └──────────────────────────────────────────────────┘
# set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'
# set -g @plugin 'catppuccin/tmux#v2.1.0'
# set -g @catppuccin_flavor 'mocha'
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
run -b '~/.tmux/plugins/tpm/tpm'
