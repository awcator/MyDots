# =============================================================================
# Kitty Terminal Config — Ported from awcator's URxvt .Xresources
# =============================================================================

# --- Remote control (needed for programmatic marker control) ---
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# --- Shell integration ---
shell_integration enabled

# --- True color passthrough for tmux ---
term xterm-kitty

# --- Fonts ---
font_family      Source Code Pro
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Text rendering: 'platform' uses the OS default, or use legacy(gamma, multiplier)
# e.g. legacy(1.0 0) for thin rendering, legacy(1.75 20) for bolder
text_composition_strategy platform

# Disable ligatures (URxvt doesn't have them)
disable_ligatures    always

# Emoji font is automatically picked up (Noto Color Emoji)
# Kitty natively renders full-color emoji!

# --- Cursor ---
cursor_beam_thickness 1.5
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# --- Scrollback ---
scrollback_lines 2048

# --- Window ---
window_padding_width 0
remember_window_size yes
initial_window_width  92c
initial_window_height 24c
confirm_os_window_close 0

# --- Bell ---
enable_audio_bell no
visual_bell_duration 0.0

# --- URL handling ---
url_color #3465a4
url_style curly
open_url_with default
detect_urls yes

# --- Clipboard (Ctrl+Shift+C / Ctrl+Shift+V like your URxvt) ---
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# --- Scroll keybinds (matching URxvt Shift-Up/Down) ---
map shift+up   scroll_line_up
map shift+down scroll_line_down

# --- Color Scheme (exact match from your .Xresources) ---
foreground #ffffff
background #000000
cursor     #ffffff

# Black
color0  #000000
color8  #555753

# Red
color1  #cc0000
color9  #ef2929

# Green
color2  #4e9a06
color10 #8ae234

# Yellow
color3  #c4a000
color11 #fce94f

# Blue
color4  #5bc0de
color12 #9aecf7

# Magenta
color5  #75507b
color13 #ad7fa8

# Cyan
color6  #06989a
color14 #34e2e2

# White
color7  #d3d7cf
color15 #eeeeec

# Background opacity (opaque like your URxvt transparent:false)
background_opacity 1.0

# =============================================================================
# LIVE WORD HIGHLIGHTING (ported from URxvt matcher patterns)
# =============================================================================
# mark1 = red (errors), mark2 = green (success), mark3 = magenta (status)
# Markers are auto-applied via ~/.bashrc on every new window
mark1_foreground #ef2929
mark1_background #000000

mark2_foreground #8ae234
mark2_background #000000

mark3_foreground #fce94f
mark3_background #000000

# Hints kitten for clickable file:line (opens in vim)
map ctrl+shift+e kitten hints --type regex --regex '(/\S+?):(\d+)' --program 'vim +{2} {1}'

# --- Performance ---
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# =============================================================================
# TAB BAR
# =============================================================================
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            1
tab_title_template          "{index}:{cwd.replace('/home/awcator', '~')[-24:]}"
# Ignore title set by child process (tmux/shell) — use cwd instead
allow_hyperlinks            yes
tab_activity_symbol         none
active_tab_foreground       #000000
active_tab_background       #8ae234
active_tab_font_style       bold
inactive_tab_foreground     #d3d7cf
inactive_tab_background     #222222
inactive_tab_font_style     normal
tab_bar_background          #000000

# Switch tabs
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+.     move_tab_forward
map ctrl+shift+,     move_tab_backward

# =============================================================================
# SPLIT PANES
# =============================================================================
map ctrl+shift+enter new_window_with_cwd
map alt+enter        launch --cwd=current --location=hsplit
map alt+shift+enter  launch --cwd=current --location=vsplit
map alt+left         neighboring_window left
map alt+right        neighboring_window right
map alt+up           neighboring_window up
map alt+down         neighboring_window down
map ctrl+shift+r     start_resizing_window

# =============================================================================
# SCROLLBACK — search & jump to prompt
# =============================================================================
scrollback_lines         50000
scrollback_pager         less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
map ctrl+shift+f         show_scrollback
# Jump between shell prompts (requires shell_integration enabled)
map ctrl+shift+z         scroll_to_prompt -1
map ctrl+shift+x         scroll_to_prompt 1

# =============================================================================
# MOUSE & SELECTION
# =============================================================================
copy_on_select            clipboard
strip_trailing_spaces     smart
# Right-click pastes
mouse_map right press ungrabbed paste_from_clipboard
# Triple-click selects whole line
mouse_map left triplepress ungrabbed select_line
# Open URL on Ctrl+click
mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link

# =============================================================================
# IMAGE PREVIEW (icat)
# =============================================================================
# Use: kitty +kitten icat image.png
# Already works — just making sure transfer mode is optimal for X11
term_info_sharing         yes

# =============================================================================
# MISC QUALITY OF LIFE
# =============================================================================
# Dim inactive panes slightly
inactive_text_alpha       0.7

# Wider scrollback search
map ctrl+shift+g          scroll_to_mark prev
map ctrl+shift+shift+g    scroll_to_mark next

# Open config quickly
map ctrl+shift+F2         edit_config_file

# Reload config without restart
map ctrl+shift+F5         load_config_file

# Increase/decrease font size
map ctrl+shift+equal      change_font_size all +1.0
map ctrl+shift+minus      change_font_size all -1.0
map ctrl+shift+0          change_font_size all 0
